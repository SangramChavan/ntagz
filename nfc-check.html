<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC Capability Tester — ntagz</title>

  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'><rect width='20' height='20' rx='4' fill='%23FF4500'/><path d='M10 2C10 2 5 5.5 5 10C5 14.5 10 18 10 18M10 2C10 2 15 5.5 15 10C15 14.5 10 18 10 18M10 6C10 6 7.5 7.5 7.5 10C7.5 12.5 10 14 10 14M10 6C10 6 12.5 7.5 12.5 10C12.5 12.5 10 14 10 14' stroke='white' stroke-width='1.5' stroke-linecap='round' fill='none'/></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <style>
    /* ── TOKENS ── */
    :root {
      --cream: #FAF7F2;
      --warm: #F2EDE4;
      --paper: #ECEADF;
      --ink: #1A1714;
      --ink-2: #4A4540;
      --ink-3: #8A837A;
      --tagz: #FF4500;
      --tagz-lt: #FFF0EB;
      --tagz-dk: #CC3700;
      --teal: #007A6B;
      --teal-lt: #E6F4F2;

      --ff-head: 'Familjen Grotesk', sans-serif;
      --ff-body: 'Manrope', sans-serif;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --r-lg: 22px;
      --r: 14px;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--ff-body);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── HIGH-PRO NAVIGATION (RE-ENGINEERED) ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 247, 242, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--paper);
    }

    .nav-inner {
      max-width: 1200px;
      margin: auto;
      padding: 0 24px;
      height: 64px;
      display: grid;
      /* Fixed layout keeping logo mathematically dead-centered */
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
    }

    /* Back Link Micro-interaction */
    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--ink-2);
      text-decoration: none;
      font-family: var(--ff-body);
      font-weight: 500;
      font-size: 14px;
      transition: color 0.25s var(--ease);
      justify-self: start;
    }

    .nav-back svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.25s var(--ease);
    }

    .nav-back:hover {
      color: var(--tagz);
    }

    .nav-back:hover svg {
      transform: translateX(-4px);
    }

    .logo {
      grid-column: 2;
      font-family: var(--ff-head);
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background: var(--tagz);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 16px; height: 16px; fill: #fff; }
    .logo-text em { color: var(--tagz); font-style: normal; }

    .nav-meta {
      grid-column: 3;
      justify-self: end;
      font-family: var(--ff-head);
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── MAIN CARD CONTAINER ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .tester-card {
      background: #fff;
      border: 1px solid var(--paper);
      border-radius: var(--r-lg);
      padding: 40px 24px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.04);
      text-align: center;
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--warm);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      transition: all 0.4s var(--ease);
    }

    .icon-wrapper svg {
      width: 40px;
      height: 40px;
      fill: var(--ink-2);
    }

    h1 {
      font-family: var(--ff-head);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--warm);
      color: var(--ink-2);
      margin-bottom: 24px;
    }

    p.description {
      font-size: 14px;
      color: var(--ink-2);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* ── BUTTON STYLING (AWESOME UPDATE) ── */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      font-family: var(--ff-head);
      font-weight: 600;
      font-size: 15px;
      padding: 14px 28px;
      border-radius: var(--r);
      background: var(--ink);
      color: #fff;
      cursor: pointer;
      border: none;
      transition: all 0.2s var(--ease);
      text-decoration: none;
    }

    .btn:hover {
      background: var(--tagz);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 69, 0, 0.2);
    }

    /* Secondary Soft Button for elegant context exits */
    .btn-secondary {
      background: var(--warm);
      color: var(--ink);
    }

    .btn-secondary:hover {
      background: var(--paper);
      color: var(--ink);
      transform: translateY(-1px);
      box-shadow: none;
    }

    /* Dynamic Colorway Shifts */
    .state-supported .icon-wrapper { background: var(--teal-lt); }
    .state-supported .icon-wrapper svg { fill: var(--teal); }
    .state-supported .status-badge { background: var(--teal-lt); color: var(--teal); }

    .state-unsupported .icon-wrapper { background: var(--tagz-lt); }
    .state-unsupported .icon-wrapper svg { fill: var(--tagz); }
    .state-unsupported .status-badge { background: var(--tagz-lt); color: var(--tagz); }

    /* Responsive scaling for viewport protection */
    @media (max-width: 520px) {
      .nav-inner {
        display: flex;
        justify-content: space-between;
      }
      .nav-meta {
        display: none;
      }
    }
  </style>
</head>

<body>

  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-back" aria-label="Return to index dashboard">
        <svg viewBox="0 0 24 24">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span>Back to home</span>
      </a>

      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 2C10 2 5 5.5 5 10C5 14.5 10 18 10 18M10 2C10 2 15 5.5 15 10C15 14.5 10 18 10 18M10 6C10 6 7.5 7.5 7.5 10C7.5 12.5 10 14 10 14M10 6C10 6 12.5 7.5 12.5 10C12.5 12.5 10 14 10 14" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" />
          </svg>
        </div>
        <div class="logo-text">N<em>tagz</em></div>
      </div>

      <div class="nav-meta">Module // 04</div>
    </div>
  </nav>

  <main>
    <div class="tester-card" id="testerCard">
      <div class="icon-wrapper" id="statusIcon">
        <svg viewBox="0 0 24 24" id="svgIcon">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
        </svg>
      </div>
      
      <h1 id="headline">NFC Detector</h1>
      <div class="status-badge" id="statusBadge">Checking Device...</div>
      
      <p class="description" id="textDesc">
        Web browsers require a quick security handshake to interface with your mobile antenna safely. Tap the verification button below to scan your hardware.
      </p>

      <div class="button-group" id="btnGroup">
        <button class="btn" id="actionBtn" onclick="verifyNFCHardware()">Check NFC Status</button>
      </div>
    </div>
  </main>

  <script>
    const card = document.getElementById('testerCard');
    const badge = document.getElementById('statusBadge');
    const headline = document.getElementById('headline');
    const desc = document.getElementById('textDesc');
    const button = document.getElementById('actionBtn');
    const btnGroup = document.getElementById('btnGroup');

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

    function runInitialEnvironmentCheck() {
      if (isIOS) {
        setUnsupportedState("iOS Restriction", "Apple restricts third-party web browsers (Safari/Chrome) from testing NFC antennas directly via websites. While your iPhone contains premium NFC hardware for Apple Pay, you must use a native app to read tags.");
        showHomeFallbackButton();
      } else if (!("NDEFReader" in window)) {
        setUnsupportedState("Not Supported", "Your current web browser configuration or phone hardware does not support the Web NFC API standards. Try accessing this link via Google Chrome on an Android smartphone.");
        showHomeFallbackButton();
      }
    }

    async function verifyNFCHardware() {
      badge.textContent = "Querying Chipset...";
      
      try {
        const reader = new NDEFReader();
        await reader.scan();
        
        card.className = "tester-card state-supported";
        badge.textContent = "NFC Enabled";
        headline.textContent = "Hardware Detected!";
        desc.textContent = "Excellent news. Your smartphone is perfectly optimized with active contactless hardware configurations. You can smoothly scan, program, and interact with all ntagz card and coin tag units.";
        showHomeFallbackButton(true); // pass true to use standard primary styling upon success
      } catch (error) {
        console.error(error);
        if (error.name === "NotAllowedError" || error.name === "PermissionError") {
          badge.textContent = "Permission Denied";
          desc.textContent = "The hardware verification request was cancelled. Please authorize browser permissions if you wish to scan your phone's interior chip layout.";
        } else {
          setUnsupportedState("No Active NFC", "The browser responded successfully, but your physical device antenna appears turned off or absent entirely. Please make sure 'NFC' is toggled ON inside your Android System Settings panel.");
          showHomeFallbackButton();
        }
      }
    }

    function setUnsupportedState(badgeText, descriptionText) {
      card.className = "tester-card state-unsupported";
      badge.textContent = badgeText;
      headline.textContent = "NFC Unavailable";
      desc.textContent = descriptionText;
    }

    // Dynamic Context Trigger to present a crisp Return CTA in-card
    function showHomeFallbackButton(isPrimaryStyle = false) {
      button.style.display = "none";
      
      // Prevent duplicating home CTA buttons if re-run
      if(document.getElementById('cardHomeBtn')) return;

      const homeBtn = document.createElement('a');
      homeBtn.href = "/";
      homeBtn.id = "cardHomeBtn";
      homeBtn.textContent = "Return to Dashboard";
      homeBtn.className = isPrimaryStyle ? "btn" : "btn btn-secondary";
      
      btnGroup.appendChild(homeBtn);
    }

    runInitialEnvironmentCheck();
  </script>
</body>
</html>
